name: Build APK

# 触发条件：推送代码到 main/master 分支，或手动触发
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 安装 Android SDK
      uses: android-actions/setup-android@v3
      with:
        sdk-platform: '33'
        sdk-build-tools: '33.0.2'

    - name: 生成 Gradle Wrapper
      run: gradle wrapper --gradle-version 7.5.1

    - name: 赋予 gradlew 执行权限
      run: chmod +x gradlew

    - name: 编译 Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: 上传 APK 产物
      uses: actions/upload-artifact@v4
      with:
        name: word-adventure-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
