// app 模块构建文件
apply plugin: 'com.android.application'

android {
    namespace 'com.wordapp.adventure'
    compileSdk 33

    defaultConfig {
        applicationId "com.wordapp.adventure"
        minSdk 21          // 安卓 5.0，覆盖 99% 设备
        targetSdk 33
        versionCode 1
        versionName "2.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // 使用 framework Activity + framework 主题，无需额外依赖
}
